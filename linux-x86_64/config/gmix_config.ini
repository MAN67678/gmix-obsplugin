; ============================================================================
;  GMix configuration  (Linux, OBS-plugin era)
;
;  GMix runs INSIDE OBS as a plugin (obs-gmix-source) -- there is nothing to
;  "launch" for gmix itself. Add the "GMix Motion Blur" source in OBS once
;  (its target-process/GPU settings live in OBS's own Properties dialog for
;  that source, and persist in your scene collection like any other source).
;
;  This file now only configures [capture]: run ./gmix_launch.sh once to
;  register the Vulkan capture layer and grant the target app persistent
;  capture access, then launch the game normally from then on.
;  Lines starting with ';' or '#' are comments.
; ============================================================================

[capture]
; Name fragment of the app to capture (matches the process). Saved as the
; Vulkan capture layer's target so ENABLE_GMIX hooks the right process.
target   = osu!
; Path to the osu! AppImage to launch WITH the GMix capture layer enabled.
; gmix_launch.sh starts it as:
;     ENABLE_GMIX=1 GMIX_TARGET_PROCESS=<target> <appimage>
; (Linux capture is the implicit Vulkan layer -- there is no DLL injection.)
; Leave blank if you're using `flatpak_app_id` below instead.
appimage =
; osu!lazer as a Flatpak (sh.ppy.osu) instead of the AppImage. When set,
; gmix_launch.sh grants it PERSISTENT capture access via `flatpak override`:
;   - --filesystem for the layer dir + IPC socket dir + ~/.config/gmix
;     (the Flatpak sandbox does not see these host paths by default)
;   - --env for ENABLE_GMIX / GMIX_TARGET_PROCESS / VK_LAYER_PATH
;   - --env for XDG_DATA_DIRS (prepending the layer's parent dir) -- modern
;     Vulkan loaders don't reliably honor VK_LAYER_PATH alone for IMPLICIT
;     layers inside a sandbox (the same issue that broke MangoHud/vkBasalt
;     in Steam's pressure-vessel: https://github.com/ValveSoftware/steam-runtime/issues/662)
; Once set, launch the game normally (app menu, `flatpak run`, etc.) --
; capture is always on, no special launch command needed.
flatpak_app_id = sh.ppy.osu
